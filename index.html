<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something Big Is Coming</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0A3B5F;
      --navy-mid: #0d4a77;
      --navy-light: #1a6ea8;
      --gold: #C9A84C;
      --cream: #F5EDD8;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      background: #040d14;
      font-family: 'Cormorant Garamond', serif;
      color: var(--cream);
      overflow: hidden;
    }

    /* ── starfield ── */
    #stars {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 40%, #0a1a2e 0%, #040d14 70%);
    }
    #stars::before, #stars::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 55%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 15%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 60% 85%, rgba(255,255,255,.3) 0%, transparent 100%);
      background-size: 400px 400px;
    }

    /* ── layout ── */
    #scene {
      position: relative; z-index: 1;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }

    /* ── map container ── */
    #map-wrap {
      position: relative;
      width: min(90vw, 820px);
      animation: floatUp 3s ease forwards;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* glow behind map */
    #map-wrap::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(ellipse at center, rgba(10,59,95,.7) 0%, transparent 70%);
      z-index: -1;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .7; transform: scale(1); }
      50%       { opacity: 1;  transform: scale(1.04); }
    }

    svg#world {
      width: 100%; height: auto;
      display: block;
      filter: drop-shadow(0 0 18px rgba(10,59,95,.9)) drop-shadow(0 0 40px rgba(26,110,168,.4));
    }

    /* land */
    .land {
      fill: var(--navy);
      stroke: #1a6ea8;
      stroke-width: 0.4;
      transition: fill .3s;
    }
    .land:hover { fill: var(--navy-mid); cursor: default; }

    /* ocean */
    #ocean { fill: #040d14; }

    /* grid lines */
    .graticule {
      fill: none;
      stroke: rgba(26,110,168,.15);
      stroke-width: 0.3;
    }

    /* ── text block ── */
    #tagline {
      margin-top: 36px;
      text-align: center;
      animation: fadeIn 1s 1.8s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    #tagline h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 5.2rem);
      letter-spacing: .12em;
      line-height: 1;
      color: var(--white);
      text-shadow: 0 0 30px rgba(10,59,95,.9), 0 0 60px rgba(26,110,168,.5);
    }

    #tagline h1 span {
      color: var(--gold);
    }

    #tagline p {
      margin-top: 14px;
      font-size: clamp(.85rem, 2vw, 1.05rem);
      font-weight: 300;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(245,237,216,.55);
      font-family: 'Space Mono', monospace;
    }

    /* ── divider ── */
    .divider {
      margin: 22px auto 0;
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: fadeIn 1s 2.4s ease forwards;
      opacity: 0;
    }

    /* ── ping dots on map ── */
    .ping {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      transform: translate(-50%, -50%);
      animation: pingAnim 2.5s ease-in-out infinite;
    }
    .ping::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      opacity: 0;
      animation: ripple 2.5s ease-out infinite;
    }

    @keyframes pingAnim {
      0%, 100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      50%       { transform: translate(-50%,-50%) scale(1.3); opacity: .7; }
    }
    @keyframes ripple {
      0%   { transform: scale(1); opacity: .8; }
      100% { transform: scale(3.5); opacity: 0; }
    }

    /* ── scan line ── */
    #scanline {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(26,110,168,.4) 50%, transparent 100%);
      animation: scan 6s linear infinite;
      pointer-events: none;
      z-index: 999;
    }
    @keyframes scan {
      0%   { top: 0; }
      100% { top: 100vh; }
    }
  </style>
</head>
<body>

<div id="stars"></div>
<div id="scanline"></div>
